<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="340" viewBox="0 0 260 340" fill="none">
  <!-- Hand-drawn marker-style arrow (white, transparent background) -->
  <g opacity="0.98">
    <!-- main stroke (more aggressive curve + wobble) -->
    <path
      d="M150 28
         C110 68, 188 110, 128 152
         C86 182, 176 230, 118 270
         C92 288, 112 304, 138 316"
      stroke="#FFFFFF"
      stroke-width="20"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- subtle secondary stroke for marker texture -->
    <path
      d="M144 34
         C110 72, 178 110, 124 148
         C88 176, 168 230, 116 266
         C98 280, 112 296, 132 308"
      stroke="#FFFFFF"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.55"
    />

    <!-- arrow head (bigger + sharper) -->
    <path
      d="M92 250
         C110 276, 120 298, 138 324
         C156 298, 166 276, 188 250"
      stroke="#FFFFFF"
      stroke-width="20"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- inner head texture -->
    <path
      d="M100 254
         C116 276, 126 296, 138 316
         C150 296, 160 276, 180 254"
      stroke="#FFFFFF"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.55"
    />
  </g>
</svg>
